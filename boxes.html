            align-items: center;
            justify-content: center;
            border-radius: 10px;

            display: block;

        }

        }

            color: white;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.4);

        .box:hover .image-slot {
